<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hóa đơn thanh toán</title>
    <link rel="stylesheet" href="../css/style4.css">
</head>
<body>
    <h2>Hóa đơn thanh toán</h2>
    <table border="1">
        <tr>
            <th>STT</th>
            <th>Tên sản phẩm</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>

        <tr>
            <td>1</td>
            <td>A</td>
            <td class = "sl">3</td>
            <td class = "dg">1000</td>
            <td class = "tt"></td>
        </tr>

        <tr>
            <td>2</td>
            <td>B</td>
            <td class = "sl">2</td>
            <td class = "dg">2000</td>
            <td class = "tt"></td>
        </tr>

        <tr>
            <td>3</td>
            <td>C</td>
            <td class = "sl">4</td>
            <td class = "dg">3000</td>
            <td class = "tt"></td>
        </tr>

        <tr>
            <td colspan="4"><b>Tổng thanh toán</b></td>
            <td id="tongThanhToan"></td>
        </tr>
    </table>

    <script>
    const donGia = document.getElementsByClassName("sl");
    const soLuong = document.getElementsByClassName("dg");
    const thanhTien = document.getElementsByClassName("tt");

    let tongThanhToan = 0;

    for (let i = 0; i < donGia.length; i++) 
    {

        thanhTien[i].innerHTML = soLuong[i].innerHTML * donGia[i].innerHTML;

       tongThanhToan += parseInt(thanhTien[i].innerHTML);

    }

    document.getElementById("tongThanhToan").innerHTML = tongThanhToan;
</script>
    
    
</body>
</html>
